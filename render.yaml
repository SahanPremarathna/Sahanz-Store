services:
  - type: web
    name: sahanz-store-api
    runtime: node
    plan: free
    rootDir: .
    buildCommand: npm install --workspaces --include-workspace-root
    startCommand: npm run start --workspace @sahanz/api
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: CLIENT_ORIGIN
        sync: false
      - key: AUTH_TOKEN_SECRET
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
